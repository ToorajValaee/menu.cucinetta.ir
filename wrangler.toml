name = "menu-cucinetta"
type = "javascript"
account_id = "YOUR_ACCOUNT_ID_HERE"
workers_dev = true

[build]
command = "npm install"

[[kv_namespaces]]
binding = "MENU_ITEMS"
id = "YOUR_NAMESPACE_ID_HERE"
preview_id = ""

[vars]
ADMIN_PASSWORD = "changeme123"

# IMPORTANT: Before deploying to production:
# 1. Replace account_id above with your Cloudflare account ID
# 2. Replace KV namespace id and preview_id with values from: npm run kv:init
# 3. Replace ADMIN_PASSWORD with a strong password
# 4. DO NOT commit real credentials - use environment variables in Cloudflare instead
