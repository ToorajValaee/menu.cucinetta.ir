<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Menu</title>
  <style>
    @font-face {
      font-family: "Morabba";
      src:
        url("/fonts/Morabba-Light.woff") format("woff"),
        url("/fonts/Morabba-Regular.ttf") format("truetype");
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root{
      --waves: 5;

      --bg: #ded7c5;
      --primary-color: #5b2b2f;
      --text-color: #5b2b2f;
      --accent-color: #591d2a;

      --max: 900px;
      --sticky-offset: 160px;
    }

    @media (min-width: 900px){
      :root{ --waves: 10; }
    }

    @media (min-width: 768px){
      :root{ --sticky-offset: 190px; }
    }

    *{ box-sizing: border-box; }

    html{ scroll-behavior: smooth; }

    body{
      margin:0;
      background: var(--bg);
      font-family: "Morabba", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--text-color);
      text-align:center;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ===== Waves ===== */
    .wave{
      height:28px;
      background-repeat: repeat-x;
      background-position:center;
      background-size: calc(100% / var(--waves)) 100%;
    }

    .wave-header{
      background-image: none;
    }

    .wave-footer{
      background-image: none;
    }

    /* ===== Sticky Header (logo + quick access) ===== */
    .sticky-header{
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 10px 20px 12px;
      border-bottom: 1px solid rgba(91, 43, 47, 0.12);
      backdrop-filter: blur(6px);
    }

    .sticky-inner{
      max-width: var(--max);
      margin: 0 auto;
    }

    /* Logo */
    .logo{
      width: 100%;
      max-width: 520px;
      margin: 6px auto 8px;
      display:block;
    }
    .logo-svg{ display:block; width:100%; height:auto; }

    /* Quick access: centered text with separators */
    .quick-access{
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0 2px;
      scrollbar-width: none;
    }
    .quick-access::-webkit-scrollbar{ display:none; }

    .quick-link{
      background: transparent;
      border: 0;
      padding: 6px 8px;
      margin: 0;
      font: inherit;
      color: var(--text-color);
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      text-decoration: none;
      text-underline-offset: 8px;
    }

    .quick-link.active{
      text-decoration: underline;
      text-decoration-thickness: 3px;
    }

    .quick-sep{
      padding: 0 6px;
      font-weight: 800;
      opacity: 0.55;
      user-select: none;
    }

    /* ===== Main Container ===== */
    .container{
      max-width: var(--max);
      margin: auto;
      padding: 18px 20px 30px;
    }

    /* ===== Menu Items ===== */
    .item{ margin: 36px 0; }

    .img-frame{
      width:100%;
      max-width:520px;
      height:300px;
      margin:0 auto 16px;
      border-radius:18px;
      overflow:hidden;
      position:relative;
      background:#ddd;
    }

    .img-frame img{
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      object-fit:cover;
      opacity:0;
      transition: opacity 0.3s;
    }

    .img-frame img.loaded{ opacity:1; }

    .item h2{
      margin:0;
      font-size:32px;
      font-weight:900;
      letter-spacing:2px;
    }

    .item p{
      margin:8px 0 0;
      font-size:20px;
      font-weight:700;
    }

    .price{
      margin-top:8px;
      font-size:18px;
      font-weight:800;
      color: var(--accent-color);
    }

    .category-title{
      font-size:28px;
      font-weight:900;
      margin: 56px 0 16px;
      scroll-margin-top: var(--sticky-offset);
    }

    .category-underline{
      width:200px;
      height:4px;
      background: color-mix(in srgb, var(--primary-color) 30%, transparent);      
      margin:12px auto 30px;
      border-radius:4px;
    }

    .item-underline{
      width:300px;
      height:2px;
      background: #5b2b2f48;
      margin:12px auto 30px;
      border-radius:4px;
    }

    .note{
      margin-top:40px;
      font-size:16px;
      font-weight:700;
    }

    .loading{
      text-align:center;
      padding: 30px 20px;
      color:#999;
    }

    .error{
      background:#f8d7da;
      color:#721c24;
      padding:20px;
      border-radius:8px;
      margin:20px 0;
    }

    @media (min-width: 768px){
      .item h2{ font-size:40px; }
      .item p{ font-size:24px; }
      .quick-link{ font-size: 17px; }
    }
  </style>
</head>

<body>
  <!-- Wave stays above sticky header -->
  <div class="wave wave-header"></div>

  <!-- Sticky header includes logo + quick access -->
  <header class="sticky-header">
    <div class="sticky-inner">
      <img id="brand-logo-img" class="logo" alt="" />

      <nav id="category-quick-access" class="quick-access" aria-label="دسترسی سریع دسته‌بندی‌ها" style="display:none;"></nav>
    </div>
  </header>

  <div class="container">
    <div id="loading" class="loading">بارگذاری منو...</div>
    <div id="error"></div>
    <div id="menu-container"></div>

    <div class="note" id="brand-note"></div>
  </div>

  <div class="wave wave-footer"></div>

  <script>
    async function loadPublicConfig() {
      const res = await fetch("/api/public-config");
      if (!res.ok) return null;
      return await res.json();
    }

    function applyPublicConfig(cfg) {
      if (!cfg) return;

       // Update title
      document.title = cfg.brandName || "Menu";

      const titleEl = document.getElementById("page-title");
      if (titleEl) titleEl.textContent = cfg.brandName || "Menu";

      // Update header title
      const brandTitle = document.getElementById("brand-title");
      if (brandTitle) brandTitle.textContent = cfg.brandNameFa || cfg.brandName;

      if (cfg.theme?.bg)
        document.documentElement.style.setProperty("--bg", cfg.theme.bg);

      if (cfg.theme?.primary)
        document.documentElement.style.setProperty("--primary-color", cfg.theme.primary);

      if (cfg.theme?.text)
        document.documentElement.style.setProperty("--text-color", cfg.theme.text);

      if (cfg.theme?.accent)
        document.documentElement.style.setProperty("--accent-color", cfg.theme.accent);

      // Update waves dynamically
      const waveColor = encodeURIComponent(cfg.theme?.primary || "#5b2b2f");

      const headerWave = `
        url("data:image/svg+xml;utf8,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 26' preserveAspectRatio='none'>
          <path fill='${waveColor}' d='M0 0 H200 V10 C166 10 152 26 100 26 C48 26 34 10 0 10 Z'/>
        </svg>")
      `;

      const footerWave = `
        url("data:image/svg+xml;utf8,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 26' preserveAspectRatio='none'>
          <path fill='${waveColor}' d='M0 26 H200 V16 C166 16 152 0 100 0 C48 0 34 16 0 16 Z'/>
        </svg>")
      `;

      document.querySelector(".wave-header").style.backgroundImage = headerWave;
      document.querySelector(".wave-footer").style.backgroundImage = footerWave;

      const note = document.getElementById("brand-note");
      if (note) {
        const text = (cfg.noteFa || "").replace("{brandFa}", cfg.brandNameFa || "");
        note.textContent = text;
      }

      const logoImg = document.getElementById("brand-logo-img");
      if (logoImg && cfg.logoUrl) {
        logoImg.src = cfg.logoUrl;
        logoImg.alt = cfg.brandName || "";
      }
    }

    function el(id){ return document.getElementById(id); }
    // Lazy load images
    function setupLazyLoading(){
      const images = document.querySelectorAll("img[data-src]");
      if (!("IntersectionObserver" in window)){
        images.forEach(img => { img.src = img.dataset.src; img.classList.add("loaded"); });
        return;
      }

      const imageObserver = new IntersectionObserver((entries, observer)=>{
        entries.forEach(entry=>{
          if (entry.isIntersecting){
            const img = entry.target;
            img.src = img.dataset.src;
            img.addEventListener("load", ()=>img.classList.add("loaded"), { once:true });
            observer.unobserve(img);
          }
        });
      }, { rootMargin: "150px 0px" });

      images.forEach(img=>imageObserver.observe(img));
    }

    function setActiveQuick(catId, ensureVisible){
      document.querySelectorAll(".quick-link").forEach(a => a.classList.remove("active"));
      const active = document.querySelector(`.quick-link[data-cat='${catId}']`);
      if (!active) return;
      active.classList.add("active");
      if (ensureVisible){
        active.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
      }
    }

    function scrollToCategory(catId) {
      setActiveQuick(catId, true); // set immediately on click

      const target = document.getElementById("cat-" + catId);
      if (!target) return;

      const offset =
        parseInt(getComputedStyle(document.documentElement).getPropertyValue("--sticky-offset")) || 0;

      const y = target.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: y, behavior: "smooth" });
    }

    function buildQuickAccess(categories){
      const nav = el("category-quick-access");
      if (!nav) return;

      if (!categories || categories.length === 0){
        nav.style.display = "none";
        return;
      }

      nav.style.display = "flex";
      nav.innerHTML = "";

      categories.forEach((cat, idx)=>{
        const a = document.createElement("button");
        a.type = "button";
        a.className = "quick-link";
        a.textContent = cat.name;
        a.setAttribute("data-cat", cat.id);
        a.addEventListener("click", ()=>scrollToCategory(cat.id));
        nav.appendChild(a);

        if (idx < categories.length - 1){
          const sep = document.createElement("span");
          sep.className = "quick-sep";
          sep.textContent = " | ";
          nav.appendChild(sep);
        }
      });

      setActiveQuick(categories[0].id, false);
    }

    function setupCategorySpy(categories) {
      if (!("IntersectionObserver" in window)) return;

      const headerOffset =
        parseInt(getComputedStyle(document.documentElement).getPropertyValue("--sticky-offset")) || 0;

      // Build a list of section title elements
      const targets = categories
        .map((c) => document.getElementById("cat-" + c.id))
        .filter(Boolean);

      const observer = new IntersectionObserver(
        (entries) => {
          // Collect all visible section titles
          const visible = entries.filter((e) => e.isIntersecting);
          if (visible.length === 0) return;

          // Pick the one closest to the top of viewport (below the sticky header)
          let best = visible[0];
          let bestDist = Infinity;

          for (const e of visible) {
            const top = e.boundingClientRect.top;
            const dist = Math.abs(top - headerOffset);
            if (dist < bestDist) {
              bestDist = dist;
              best = e;
            }
          }

          const id = best.target.getAttribute("data-cat-id");
          if (id) setActiveQuick(id, false);
        },
        {
          root: null,
          // shift detection area down by header height so "current" means below sticky header
          rootMargin: `-${headerOffset}px 0px -70% 0px`,
          threshold: [0, 0.1, 0.25, 0.5, 0.75, 1],
        }
      );

      targets.forEach((t) => observer.observe(t));
    }

    function renderItem(item){
      return `
        <div class="item">
          ${
            item.image
              ? `
                <div class="img-frame">
                  <img alt="${item.name}" data-src="${item.image}" />
                </div>
              `
              : ""
          }
          <h2>${item.name}</h2>
          ${item.description ? `<p>${item.description}</p>` : ""}
          <div class="price">${item.price}</div>
        </div>
        <div class="item-underline"></div>
      `;
    }

    async function loadMenu(){
      try{
        const categoriesResponse = await fetch("/api/categories");
        const itemsResponse = await fetch("/api/items");

        if (!categoriesResponse.ok || !itemsResponse.ok){
          throw new Error("Failed to load menu");
        }

        const categories = await categoriesResponse.json();
        const items = await itemsResponse.json();

        const container = el("menu-container");
        const loading = el("loading");

        if (!items || items.length === 0) {
          container.innerHTML = `<div class="loading">منو خالی است</div>`;
          return;
        }

        // loading.style.display = "none";

        if (categories && categories.length > 0){
          buildQuickAccess(categories);

          categories.forEach(category=>{
            const categoryItems = items.filter(i => i.category === category.id);
            if (categoryItems.length === 0) return;

            container.innerHTML += `
              <h2 id="cat-${category.id}" data-cat-id="${category.id}" class="category-title">${category.name}</h2>
              <div class="category-underline"></div>
            `;

            categoryItems.forEach(item=>{
              container.innerHTML += renderItem(item);
            });
          });

          setupCategorySpy(categories);
        } else {
          el("category-quick-access").style.display = "none";
          items.forEach(item => { container.innerHTML += renderItem(item); });
        }

        setupLazyLoading();
      } catch (err){
        console.error("Error loading menu:", err);
        // el("loading").style.display = "none";
        el("error").innerHTML = `<div class="error">خطا در بارگذاری منو</div>`;
        const nav = el("category-quick-access");
        if (nav) nav.style.display = "none";
      }
    }

    (async () => {
      const loading = document.getElementById("loading");
      const errorBox = document.getElementById("error");

      try {
        if (loading) {
          loading.style.display = "block";
          loading.textContent = "بارگذاری منو...";
        }

        // Load config + menu together
        const cfg = await loadPublicConfig().catch(() => null);
        applyPublicConfig(cfg);

        await loadMenu(); // make sure loadMenu throws on failure (or handles internally)

        // Done
        if (loading) loading.style.display = "none";
      } catch (err) {
        console.error(err);
        if (loading) loading.style.display = "none";
        if (errorBox) errorBox.innerHTML = `<div class="error">خطا در بارگذاری</div>`;
      }
    })();
  </script>
</body>
</html>
