<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>غذای اصلی | CUCINETTA</title>
  <style>
    @font-face {
      font-family: "Morabba";
      src: 
        url("/fonts/Morabba-Light.woff") format("woff"),
        url("/fonts/Morabba-Regular.ttf") format("truetype");
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --waves: 5;
      --bg: #ded7c5;
      --maroon: #5b2b2f;
      --max: 900px;
    }

    @media (min-width: 900px) {
      :root {
        --waves: 10;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Morabba", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--maroon);
      text-align: center;
    }

    /* ====== Wave SVG container ====== */
    .wave svg {
      display: block;
      width: 100%;
      height: 50px;
    }

    .wave {
      height: 28px;
      background-repeat: repeat-x;
      background-position: center;
      background-size: calc(100% / var(--waves)) 100%;
    }

    .wave-header {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 26' preserveAspectRatio='none'><path fill='%235B2B2F' d='M0 0 H200 V10 C166 10 152 26 100 26 C48 26 34 10 0 10 Z'/></svg>");
    }

    .wave-footer {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 26' preserveAspectRatio='none'><path fill='%235B2B2F' d='M0 26 H200 V16 C166 16 152 0 100 0 C48 0 34 16 0 16 Z'/></svg>");
      display: block;
      min-height: 28px;
    }

    /* ====== Main Container ====== */
    .container {
      max-width: var(--max);
      margin: auto;
      padding: 20px 20px 30px;
    }

    /* ====== Logo ====== */
    .logo {
      width: 100%;
      max-width: 520px;
      margin: 10px auto 30px;
      display: block;
    }

    .logo-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ====== Title ====== */
    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
    }

    .underline {
      width: 200px;
      height: 4px;
      background: var(--maroon);
      margin: 12px auto 30px;
      border-radius: 4px;
    }

    /* ====== Menu Items ====== */
    .item {
      margin: 36px 0;
    }

    .img-frame {
      width: 100%;
      max-width: 520px;
      height: 300px;
      margin: 0 auto 16px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      background: #ddd;
    }

    .img-frame img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .img-frame img.loaded {
      opacity: 1;
    }

    .img-frame .placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #999;
      font-size: 14px;
    }

    .item h2 {
      margin: 0;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .item p {
      margin: 8px 0 0;
      font-size: 20px;
      font-weight: 700;
    }

    .price {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 800;
      color: #591d2a;
    }

    .category-title {
      font-size: 24px;
      font-weight: 800;
      margin: 40px 0 20px;
      margin-top: 60px;
    }

    .category-underline {
      width: 100px;
      height: 3px;
      background: var(--maroon);
      margin: 10px auto 30px;
      border-radius: 4px;
    }

    .note {
      margin-top: 40px;
      font-size: 16px;
      font-weight: 700;
    }

    .admin-link {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: var(--maroon);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      z-index: 1000;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }

    @media (min-width: 768px) {
      .title {
        font-size: 34px;
      }
      .item h2 {
        font-size: 40px;
      }
      .item p {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <!-- ===== Header Wave ===== -->
  <div class="wave wave-header"></div>

  <div class="container">
    <!-- Logo SVG -->
    <div class="logo" aria-label="CUCINETTA logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8984.11 1296.16" role="img" aria-label="CUCINETTA" class="logo-svg">
        <path fill="#591D2A" d="M7449.89 1246.15l660.91 -0.06c32.28,-29.92 307.65,-467.77 331.54,-517.99l474.41 -2.71 0 563 67.37 7.76 -2.68 -1093.02 -64.77 -0.22 0.08 457.75 -422.32 -0.02c19.77,-53.29 105.2,-171.1 140.35,-227.51 39.65,-63.62 117.27,-167.62 144.08,-232.57l-669.36 0c-59.84,115.64 -393.02,611.93 -495.89,781.78 -46.74,77.18 -132,188.16 -163.72,263.81zm-4041.76 -1049.48l0.23 1051.44 64.02 0 3.31 -935.57c14.24,8.53 665.31,816.9 714.59,896.68 12.36,20.01 9.07,21.09 21.07,38.86l561.45 3.42 0.01 -1061.34 -569.19 1.16 -2.72 915.85c-35.27,-31.87 -63.87,-74.24 -95.23,-114.74 -34.28,-44.29 -62.69,-78.01 -97.05,-121.12l-518.59 -656.69c-29.63,-31.66 -27.77,-24.16 -81.9,-17.94zm1449.82 149.26l-9.65 895.7c97.19,11.61 856.05,4 1016.42,3.87l-0.07 -558.81 -943.71 -4.18 0.04 -157.13 473.2 -2.6 -0.24 -67.6 -472.97 -0.33 0.01 -179.03 475.8 -2.6 -0.07 -64.85 -548.42 0.34 9.66 137.23zm-4857.94 -114.24c10.06,100.74 -0.17,894.93 0,1018.99 260.32,0 786.62,9.6 1016.39,-1.96l-0.24 -554.89 -943.42 -4.53 -2.64 -426.48 475.71 -0.62 -0.01 -57.77c-68.13,-18.8 -445.79,-6.47 -545.79,-6.47l0 33.73zm2167.32 1013.79l1017.1 5.35 -2.45 -559.03 -943.82 -2.05 0.01 -424.34 475.8 -2.6 -0.07 -64.85 -540.66 0.24 -5.91 1047.28zm4521.51 -974.83l101.42 2.57 0 967.06 569.25 0 2.53 -967.06 473.14 -0.62 -0.01 -57.77c-49.34,-13.61 -1056.58,-14.21 -1146.34,-3.26l0 59.07zm-1219.2 2.57l467.87 0 0.07 967.06 571.85 0 -0.07 -967.06 106.65 0 -0.07 -64.85 -1146.37 0 0.07 64.85zm-4383.65 972.93l1011.82 2.02 -2.91 -896.84 -64.63 3.76 0.02 334.21 -876.11 0 -0.9 -337.97 -57.26 0.02c-17.51,62.42 -18.37,791.82 -10.02,894.81zm2168.76 7.13l67.67 -3.46 -0.21 -1044.06 -67.4 -6.22 -0.06 1053.74zm93.45 -1187.96c0,-65.23 -33.54,-70.18 -96.78,-62.69 -25.66,38.3 -50.23,77.01 -3.3,111.37 44,32.22 100.08,8.84 100.08,-48.68z" />
      </svg>
    </div>

    <h1 class="title">غذای اصلی</h1>
    <div class="underline"></div>

    <div id="loading" class="loading">بارگذاری منو...</div>
    <div id="error"></div>
    <div id="menu-container"></div>

    <div class="note">
      • در صورت وجود هرگونه حساسیت غذایی، لطفاً به پرسنل کوچینِتّا اطلاع دهید.
    </div>
  </div>

  <!-- ===== Footer Wave ===== -->
  <div class="wave wave-footer"></div>

  <a href="/admin/" class="admin-link">مدیریت</a>

  <script>
    // Lazy load images using Intersection Observer
    function setupLazyLoading() {
      const images = document.querySelectorAll("img[data-src]");
      const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.classList.add("loaded");
            observer.unobserve(img);
          }
        });
      });

      images.forEach((img) => imageObserver.observe(img));
    }

    async function loadMenu() {
      try {
        // Fetch categories and items
        const categoriesResponse = await fetch("/api/categories");
        const itemsResponse = await fetch("/api/items");

        if (!categoriesResponse.ok || !itemsResponse.ok) {
          throw new Error("Failed to load menu");
        }

        const categories = await categoriesResponse.json();
        const items = await itemsResponse.json();
        const container = document.getElementById("menu-container");
        const loading = document.getElementById("loading");

        if (items.length === 0) {
          loading.textContent = "منو خالی است";
          return;
        }

        loading.style.display = "none";

        // Group items by category
        if (categories.length === 0) {
          // No categories, display all items
          items.forEach((item) => {
            container.innerHTML += renderItem(item);
          });
        } else {
          // Display items grouped by category
          categories.forEach((category) => {
            const categoryItems = items.filter((item) => item.category === category.id);
            if (categoryItems.length > 0) {
              // Add category title
              const categoryHTML = `
                <h2 class="category-title">${category.name}</h2>
                <div class="category-underline"></div>
              `;
              container.innerHTML += categoryHTML;

              // Add items for this category
              categoryItems.forEach((item) => {
                container.innerHTML += renderItem(item);
              });
            }
          });
        }

        setupLazyLoading();
      } catch (error) {
        console.error("Error loading menu:", error);
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").innerHTML = `<div class="error">خطا در بارگذاری منو</div>`;
      }
    }

    function renderItem(item) {
      return `
        <div class="item">
          ${
            item.image
              ? `
            <div class="img-frame">
              <img alt="${item.name}" data-src="${item.image}" />
            </div>
          `
              : ""
          }
          <h2>${item.name}</h2>
          ${item.description ? `<p>${item.description}</p>` : ""}
          <div class="price">${item.price}</div>
        </div>
      `;
    }

    // Load menu on page load
    loadMenu();
  </script>
</body>
</html>
